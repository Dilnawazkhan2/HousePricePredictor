<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>House Price Predictor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <main class="layout">

        <!-- Left Side -->

        <section class="hero">

            <p class="eyebrow">
                MACHINE LEARNING • 2026
            </p>

            <h1>
                House
                <br>
                Price
                <br>
                Predictor
            </h1>

            <p class="description">
                Estimate residential property prices using a machine learning model trained on housing data.
            </p>

                        <!-- Right Side -->

        <aside class="sidebar">

            <div class="stat">

                <span>Dataset</span>

                <h2>1460</h2>

                <small>Properties</small>

            </div>

            <div class="stat">

                <span>Accuracy</span>

                <h2>89%</h2>

                <small>Linear Regression</small>

            </div>

        </aside>

        </section>


            <section class="predict-section" id="predictSection">

    <div class="predict-card">

        <div class="predict-header">
            <p>ESTIMATE PROPERTY VALUE</p>
            <h2>Prediction Engine</h2>
        </div>

        <form id="predictionForm">

            <div class="input-group">
                <label>Area (sq ft)</label>
                <input type="number" id="area" placeholder="2000" required>
            </div>

            <div class="grid-2">

                <div class="input-group">
                    <label>Bedrooms</label>
                    <input type="number" id="bedrooms" placeholder="3" required>
                </div>

                <div class="input-group">
                    <label>Bathrooms</label>
                    <input type="number" id="bathrooms" placeholder="2" required>
                </div>

            </div>

            <button type="submit" class="submit-btn">
                Predict Price →
            </button>

        </form>

        <div id="result" class="result-box">

            <span>Estimated Price</span>

            <h3>--</h3>

        </div>



    </main>






    </div>

</body>

</html>
